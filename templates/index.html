<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TagFix - Material You</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <header class="top-app-bar">
            <span class="material-symbols-outlined leading-icon">library_music</span>
            <h1 class="headline">TagFix</h1>
            <div class="trailing-icons">
                <button class="icon-button" id="theme-toggle">
                    <span class="material-symbols-outlined">dark_mode</span>
                </button>
            </div>
        </header>

        <main class="content">
            <div class="search-container">
                <div class="text-field outlined">
                    <input type="text" id="path-input" placeholder=" " value="/home/zuke/Music">
                    <label for="path-input">Folder Path</label>
                    <button class="icon-button" id="scan-btn">
                        <span class="material-symbols-outlined">search</span>
                    </button>
                </div>
            </div>

            <div id="file-list" class="file-list">
                <!-- File cards will be injected here -->
                <div class="empty-state">
                    <span class="material-symbols-outlined">folder_open</span>
                    <p>Enter a path to scan for audio files</p>
                </div>
            </div>
        </main>

        <div class="bottom-app-bar">
            <button class="fab" id="convert-fab">
                <span class="material-symbols-outlined">transform</span>
                <span class="label">Convert</span>
            </button>
            <button class="fab secondary" id="save-fab">
                <span class="material-symbols-outlined">save</span>
                <span class="label">Save All</span>
            </button>
        </div>
    </div>

    <!-- Convert Dialog -->
    <dialog id="convert-dialog">
        <div class="dialog-content">
            <h2 class="headline-small">Convert Files</h2>
            <p>Choose output format for selected files.</p>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="format" value="wav" checked>
                    <span>WAV</span>
                </label>
                <label class="radio-label">
                    <input type="radio" name="format" value="flac">
                    <span>FLAC</span>
                </label>
            </div>
            <div class="dialog-actions">
                <button class="text-button" id="cancel-convert">Cancel</button>
                <button class="filled-button" id="confirm-convert">Convert</button>
            </div>
        </div>
    </dialog>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
