name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Download FFmpeg binaries
        run: |
          chmod +x flutter_app/download_ffmpeg.sh
          ./flutter_app/download_ffmpeg.sh

      - name: Get Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Linux release
        working-directory: flutter_app
        run: flutter build linux --release

      - name: Package build
        working-directory: flutter_app
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../tagfix-linux.zip .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tagfix-linux.zip
          path: flutter_app/tagfix-linux.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: releases

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "TagFix ${{ github.ref_name }}"
          draft: false
          prerelease: false

      - name: Upload Linux binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: releases/tagfix-linux.zip/tagfix-linux.zip
          asset_name: tagfix-linux.zip
          asset_content_type: application/zip
