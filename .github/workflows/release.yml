name: Build and Release

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact_name: tagfix-linux.zip
            build_path: build/linux/x64/release/bundle
          - os: windows-latest
            target: windows
            artifact_name: tagfix-windows.zip
            build_path: build/windows/runner/Release
          - os: macos-latest
            target: macos
            artifact_name: tagfix-macos.zip
            build_path: build/macos/Build/Products/Release/tagfix.app

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Install Linux Dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Get Dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Application
        working-directory: flutter_app
        run: flutter build ${{ matrix.target }} --release

      # Package Linux
      - name: Compress Linux Build
        if: matrix.target == 'linux'
        working-directory: flutter_app
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../${{ matrix.artifact_name }} .

      # Package Windows
      - name: Compress Windows Build
        if: matrix.target == 'windows'
        working-directory: flutter_app
        run: |
          Compress-Archive -Path build\windows\runner\Release\* -DestinationPath ${{ matrix.artifact_name }}

      # Package macOS
      - name: Compress macOS Build
        if: matrix.target == 'macos'
        working-directory: flutter_app
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../${{ matrix.artifact_name }} tagfix.app

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: flutter_app/${{ matrix.artifact_name }}
          asset_name: ${{ matrix.artifact_name }}
          asset_content_type: application/zip
